<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="veille-cloud-securite.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Styles supplémentaires pour le filtre */
        .filters-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0 1rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #e2e8f0;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .filter-btn.active {
            background: #38bdf8;
            color: white;
            box-shadow: 0 2px 8px rgba(56,189,248,0.3);
        }
        .article {
            transition: 0.2s;
        }
        .article.hidden {
            display: none;
        }
        .badge-cloud-risk {
            display: inline-block;
            background: #dc2626;
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
    </style>
</head>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-container">
        <a href="../index.html" class="nav-link">🏠 Accueil</a>
        <a href="../aps.html" class="nav-link">📚 APs</a>

    <div class="container">
        <h1 class="hero-title">Veille technologique – Cloud & Sécurité</h1>
        <p class="hero-subtitle">Suivi automatique des vulnérabilités et risques liés aux services cloud</p>
    </div>
</section>

<!-- Graphique -->
<section>
    <h2>Évolution des publications</h2>
    <canvas id="graphique"></canvas>
</section>

<!-- Filtres et articles -->
<section>
    <h2>Articles récents</h2>
    
    <div class="filters-container">
        <button class="filter-btn active" data-filter="all">📰 Tous les articles</button>
        <button class="filter-btn" data-filter="cloud-risks">⚠️ Vulnérabilités & risques cloud</button>
